<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ 激光大冒险100 - 优化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 10px; overflow: hidden;
        }
        #gameTitle {
            color: #00d4ff; text-shadow: 0 0 20px #00d4ff;
            font-size: 20px; margin-bottom: 6px;
        }
        #gameInfo {
            display: flex; gap: 10px; color: #fff; margin-bottom: 6px;
            font-size: 12px; flex-wrap: wrap; justify-content: center;
        }
        .info-item {
            background: rgba(0, 212, 255, 0.15); padding: 3px 8px;
            border-radius: 15px; border: 1px solid rgba(0, 212, 255, 0.3);
        }
        #gameCanvas {
            border: 2px solid #00d4ff; border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            background: #0a0a0a; max-width: 100%;
        }
        #controls { margin-top: 6px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #dPad { display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); gap: 3px; }
        .dBtn {
            width: 48px; height: 48px; border: none; border-radius: 8px;
            background: linear-gradient(145deg, #00d4ff, #0099cc); color: white;
            font-size: 18px; cursor: pointer; user-select: none;
        }
        .dBtn:active { transform: scale(0.92); }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        button {
            padding: 7px 22px; font-size: 13px; border: none; border-radius: 20px;
            cursor: pointer; margin: 0 4px;
        }
        #actionBtn { background: linear-gradient(145deg, #ff6b6b, #ee5a5a); color: white; }
        #actionBtn:hover { transform: scale(1.05); }
        .screen {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; background: rgba(10, 10, 20, 0.98);
            padding: 22px; border-radius: 15px; border: 2px solid #00d4ff;
            display: none; z-index: 100; max-width: 92vw; max-height: 90vh; overflow-y: auto;
        }
        .screen h2 { color: #00d4ff; margin-bottom: 12px; font-size: 20px; }
        .screen p { margin: 6px 0; font-size: 12px; }
        .screen button { background: linear-gradient(145deg, #00d4ff, #0099cc); color: white; }
        #startScreen { display: block; }
        .shop-item {
            background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px; padding: 10px; margin: 6px; cursor: pointer; display: inline-block;
        }
        .shop-item:hover { background: rgba(255, 215, 0, 0.2); }
        .name-input {
            padding: 8px 14px; font-size: 13px; border: 2px solid #00d4ff; border-radius: 20px;
            background: rgba(0, 212, 255, 0.1); color: white; text-align: center; margin: 8px 0;
        }
        input[type="range"] {
            -webkit-appearance: none; width: 200px; height: 8px; border-radius: 4px;
            background: rgba(0, 212, 255, 0.3); outline: none; margin: 8px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
            background: #00d4ff; cursor: pointer; box-shadow: 0 0 10px #00d4ff;
        }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 8px 0; }
        th { background: rgba(255, 107, 157, 0.2); padding: 6px; color: #ff6b9d; }
        td { padding: 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #lbContent { max-height: 260px; overflow-y: auto; margin: 8px 0; }
        .tutorial-hint {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 212, 255, 0.9); color: #000; padding: 6px 16px;
            border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 50;
            display: none; text-align: center; max-width: 90%;
        }
    </style>
</head>
<body>
    <h1 id="gameTitle">⚡ 激光大冒险100</h1>
    <div id="gameInfo">
        <span class="info-item">❤️ <span id="lives">5</span></span>
        <span class="info-item">⏱️ <span id="timer">60</span>s</span>
        <span class="info-item">🎯 <span id="level">1</span>/100</span>
        <span class="info-item">🪙 <span id="coins">0</span></span>
        <span class="info-item" id="progressBox" style="display:none">📜 <span id="progress">0</span>%</span>
        <span class="info-item" id="stageBox" style="display:none">📖 <span id="stageName"></span></span>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div id="controls">
        <div id="dPad">
            <button class="dBtn" id="btnUp">▲</button>
            <button class="dBtn" id="btnLeft">◀</button>
            <button class="dBtn" id="btnRight">▶</button>
            <button class="dBtn" id="btnDown">▼</button>
        </div>
        <button id="actionBtn">开始游戏</button>
    </div>
    
    <div id="levelSelectScreen" class="screen">
        <h2>🎯 选择起始关卡</h2>
        <p style="color:#888">已解锁关卡: 1-<span id="selectMaxLevel">1</span></p>
        <div style="margin:16px 0;">
            <input type="range" id="levelSlider" min="1" max="1" value="1" style="width:250px;" oninput="document.getElementById('selectedLevel').textContent=this.value">
            <p style="font-size:26px;color:#00d4ff;margin-top:8px;">第 <span id="selectedLevel">1</span> 关</p>
        </div>
        <button onclick="confirmStartLevel()">开始游戏</button>
        <button onclick="backToMenu()" style="background:#666">返回</button>
    </div>
    
    <div id="startScreen" class="screen">
        <h2>⚡ 激光大冒险100</h2>
        <p>🎮 100关挑战 | 💣 5关后有炸弹</p>
        <p>🛒 每10关商店 | 📖 10大阶段</p>
        <p style="color:#ff6b6b;font-size:11px">🔴-1 🟠-2 🟡-3 🟢-4 🔵-5</p>
        <button onclick="showLevelSelect()">开始挑战</button>
        <button onclick="showLeaderboard()" style="background:linear-gradient(145deg,#ff6b9d,#ff4081)">🏆 排行</button>
    </div>
    
    <div id="shopScreen" class="screen">
        <h2>🛒 商店</h2>
        <p style="color:#ffd700;font-size:15px">🪙 <span id="shopCoins">0</span></p>
        <div id="shopItems"></div>
        <button onclick="closeShop()">继续</button>
    </div>
    
    <div id="gameOverScreen" class="screen">
        <h2 id="goTitle">游戏结束</h2>
        <p id="goStats"></p>
        <input type="text" id="playerName" class="name-input" placeholder="输入名字" maxlength="8"><br>
        <button onclick="submitScore()">提交分数</button>
        <button onclick="showLevelSelect()" style="background:linear-gradient(145deg,#00d4ff,#0099cc)">选择关卡</button>
        <button onclick="skipSubmit()" style="background:#666">返回主菜单</button>
    </div>
    
    <div id="lbScreen" class="screen">
        <h2>🏆 排行榜</h2>
        <div id="lbContent"></div>
        <button onclick="hideLeaderboard()">返回</button>
    </div>

    <div id="tutorialHint" class="tutorial-hint"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 600, H = 400;
        let maxLives = 5;
        let gameState = 'start';
        let level = 1, lives = 5, coins = 0;
        let levelTime = 60, totalTime = 0;
        let lastTime = 0, timerInterval = null;
        let isScrolling = false, worldW = W, camX = 0;
        let tutorialTimer = null;

        const player = { x: 50, y: 180, size: 18, speed: 3, dizzy: 0, shield: 0 };
        const startPt = { x: 30, y: 180, w: 40, h: 40 };
        const endPt = { x: 530, y: 180, w: 40, h: 40 };
        let lasers = [], bombs = [], coinList = [], particles = [];
        const items = { speed: 0, shield: 0, life: 0, time: 0 };
        const keys = {};
        const L_COLORS = ['#ff0000', '#ff8800', '#ffdd00', '#00ff00', '#0088ff'];
        const L_DAMAGE = [1, 2, 3, 4, 5];

        const STAGE_NAMES = [
            '直线防线','移动激光','旋转扫描','组合障碍','迷宫通道',
            '高速动态','连锁反应','立体交叉','极限挑战','终极Boss'
        ];

        const TUTORIALS = {
            1: '🟢 绿色激光闪过了！等它关闭时冲过去！',
            3: '💡 关键激光有红色标记，必须等它关闭才能通过！',
            5: '⚠️ 注意炸弹！靠近会引爆，保持距离！',
            11: '🔄 移动激光在来回滑动，找时机冲过去！',
            21: '🌀 旋转激光在扫描全场，注意它的旋转节奏！',
            31: '🔀 组合障碍！需要连续通过多个激光阵！',
            41: '🏰 迷宫通道！找到正确的路线！',
            51: '⚡ 高速模式！所有激光移动更快！',
            61: '🔗 连锁反应！一个激光触发会带动其他激光！',
            71: '🌐 立体交叉！多层激光同时扫描！',
            81: '💀 极限挑战！所有机制组合！',
            91: '👑 终极Boss！考验所有技能！'
        };

        let lb = JSON.parse(localStorage.getItem('lb100') || '[]');
        let maxLevelReached = parseInt(localStorage.getItem('maxLevel100') || '1');

        function saveMaxLevel(lvl) {
            if (lvl > maxLevelReached) { maxLevelReached = lvl; localStorage.setItem('maxLevel100', maxLevelReached); }
        }

        // ========== 类定义 ==========

        class Laser {
            constructor(x, y, w, h, typeIdx, interval, offset) {
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.typeIdx = typeIdx; this.active = false;
                this.timer = offset || 0; this.interval = interval;
                this.isKey = false;
            }
            update(dt, lvl) {
                this.timer += dt;
                const spd = 1 + (lvl - 1) * 0.015;
                if (this.timer >= this.interval / spd) { this.active = !this.active; this.timer = 0; }
            }
            draw() {
                const sx = this.x - camX;
                if (sx + this.w < 0 || sx > W) return;
                ctx.save();
                const c = L_COLORS[this.typeIdx];
                if (this.isKey) {
                    if (this.active) {
                        ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000';
                        ctx.fillStyle = c; ctx.fillRect(sx, this.y, this.w, this.h);
                        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.strokeRect(sx-1, this.y-1, this.w+2, this.h+2);
                    } else {
                        ctx.fillStyle = c + '30'; ctx.fillRect(sx, this.y, this.w, this.h);
                        ctx.strokeStyle = '#ff0000'; ctx.setLineDash([3,3]); ctx.lineWidth = 1;
                        ctx.strokeRect(sx, this.y, this.w, this.h);
                    }
                } else {
                    if (this.active) { ctx.shadowBlur = 12; ctx.shadowColor = c; ctx.fillStyle = c; ctx.fillRect(sx, this.y, this.w, this.h); }
                    else { ctx.fillStyle = c + '40'; ctx.setLineDash([5,5]); ctx.strokeStyle = c + '60'; ctx.fillRect(sx, this.y, this.w, this.h); ctx.strokeRect(sx, this.y, this.w, this.h); }
                }
                ctx.restore();
            }
            hit(px, py) {
                if (!this.active) return 0;
                return (px < this.x + this.w && px + player.size > this.x && py < this.y + this.h && py + player.size > this.y) ? L_DAMAGE[this.typeIdx] : 0;
            }
        }

        class MovingLaser {
            constructor(x, y, w, h, typeIdx, interval, moveAxis, moveRange, moveSpeed) {
                this.baseX = x; this.baseY = y; this.w = w; this.h = h;
                this.x = x; this.y = y; this.typeIdx = typeIdx; this.active = false;
                this.timer = 0; this.interval = interval; this.isKey = false;
                this.moveAxis = moveAxis; // 'x' or 'y'
                this.moveRange = moveRange; this.moveSpeed = moveSpeed;
                this.moveT = Math.random() * Math.PI * 2;
            }
            update(dt, lvl) {
                this.timer += dt; this.moveT += dt * this.moveSpeed / 1000;
                if (this.timer >= this.interval / (1 + (lvl-1)*0.015)) { this.active = !this.active; this.timer = 0; }
                if (this.moveAxis === 'x') this.x = this.baseX + Math.sin(this.moveT) * this.moveRange;
                else this.y = this.baseY + Math.sin(this.moveT) * this.moveRange;
            }
            draw() {
                const sx = this.x - camX;
                if (sx + this.w < 0 || sx > W) return;
                ctx.save(); const c = L_COLORS[this.typeIdx];
                if (this.isKey) {
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000';
                    if (this.active) { ctx.fillStyle = c; ctx.fillRect(sx, this.y, this.w, this.h); ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.strokeRect(sx-1,this.y-1,this.w+2,this.h+2); }
                    else { ctx.fillStyle = c+'30'; ctx.fillRect(sx, this.y, this.w, this.h); ctx.strokeStyle = '#ff0000'; ctx.setLineDash([3,3]); ctx.lineWidth = 1; ctx.strokeRect(sx,this.y,this.w,this.h); }
                } else {
                    ctx.shadowBlur = 10; ctx.shadowColor = c;
                    if (this.active) { ctx.fillStyle = c; ctx.fillRect(sx, this.y, this.w, this.h); }
                    else { ctx.fillStyle = c+'50'; ctx.fillRect(sx, this.y, this.w, this.h); }
                    // 移动指示箭头
                    ctx.fillStyle = '#fff'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(this.moveAxis === 'x' ? '↔' : '↕', sx + this.w/2, this.y + this.h/2 + 3);
                }
                ctx.restore();
            }
            hit(px, py) {
                if (!this.active) return 0;
                return (px < this.x + this.w && px + player.size > this.x && py < this.y + this.h && py + player.size > this.y) ? L_DAMAGE[this.typeIdx] : 0;
            }
        }

        class RotatingLaser {
            constructor(cx, cy, length, typeIdx, interval, rotSpeed, angleOffset) {
                this.cx = cx; this.cy = cy; this.length = length;
                this.typeIdx = typeIdx; this.active = false; this.angle = angleOffset || 0;
                this.timer = 0; this.interval = interval; this.rotSpeed = rotSpeed;
                this.isKey = false; this.w = 6;
            }
            getEndpoints() {
                const ex = this.cx + Math.cos(this.angle) * this.length;
                const ey = this.cy + Math.sin(this.angle) * this.length;
                return { x1: this.cx - Math.cos(this.angle) * this.length, y1: this.cy - Math.sin(this.angle) * this.length, x2: ex, y2: ey };
            }
            update(dt, lvl) {
                this.timer += dt; this.angle += this.rotSpeed * dt / 1000;
                if (this.timer >= this.interval / (1 + (lvl-1)*0.015)) { this.active = !this.active; this.timer = 0; }
            }
            draw() {
                const e = this.getEndpoints();
                const sx1 = e.x1 - camX, sy1 = e.y1, sx2 = e.x2 - camX, sy2 = e.y2;
                if (Math.max(sx1, sx2) < -50 || Math.min(sx1, sx2) > W + 50) return;
                ctx.save();
                const c = L_COLORS[this.typeIdx];
                if (this.active) {
                    ctx.shadowBlur = 18; ctx.shadowColor = c; ctx.strokeStyle = c; ctx.lineWidth = this.w;
                    ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
                    // 中心点
                    ctx.fillStyle = c; ctx.beginPath(); ctx.arc(this.cx - camX, this.cy, 5, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.strokeStyle = c + '50'; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
                    ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
                }
                ctx.restore();
            }
            hit(px, py) {
                if (!this.active) return 0;
                const e = this.getEndpoints();
                const px2 = px + player.size/2, py2 = py + player.size/2;
                const dist = this.distToSegment(px2, py2, e.x1, e.y1, e.x2, e.y2);
                return dist < (this.w/2 + player.size/3) ? L_DAMAGE[this.typeIdx] : 0;
            }
            distToSegment(px, py, x1, y1, x2, y2) {
                const dx = x2-x1, dy = y2-y1, lenSq = dx*dx+dy*dy;
                if (lenSq === 0) return Math.sqrt((px-x1)**2+(py-y1)**2);
                let t = ((px-x1)*dx+(py-y1)*dy)/lenSq;
                t = Math.max(0, Math.min(1, t));
                return Math.sqrt((px-(x1+t*dx))**2 + (py-(y1+t*dy))**2);
            }
        }

        class Bomb {
            constructor(x, y) {
                this.x = x; this.y = y; this.size = 22; this.t = 0;
                this.fuseTime = 0; this.fuseStarted = false;
                this.exploding = false; this.r = 0; this.maxR = 70; this.hasDamaged = false;
            }
            update(dt) {
                this.t += dt;
                if (this.fuseStarted && !this.exploding) { this.fuseTime -= dt; if (this.fuseTime <= 0) this.exploding = true; }
                if (this.exploding) { this.r += 4; return this.r < this.maxR; }
                return true;
            }
            draw() {
                const sx = this.x - camX;
                if (sx + this.size < 0 || sx > W) return;
                if (this.exploding) {
                    const g = ctx.createRadialGradient(sx+11, this.y+11, 0, sx+11, this.y+11, this.r);
                    g.addColorStop(0, 'rgba(255,100,0,0.8)'); g.addColorStop(1, 'rgba(255,0,0,0)');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx+11, this.y+11, this.r, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = '#ff4400';
                    ctx.fillStyle = '#333'; ctx.fillRect(sx, this.y, this.size, this.size);
                    const flash = this.fuseStarted ? Math.sin(this.t/50) > 0 : Math.sin(this.t/150) > 0;
                    ctx.fillStyle = this.fuseStarted ? (flash ? '#ff0000' : '#ffff00') : (flash ? '#ff0000' : '#ff8800');
                    ctx.fillRect(sx+4, this.y+4, this.size-8, this.size-8);
                    if (this.fuseStarted) {
                        const cd = Math.ceil(this.fuseTime / 1000);
                        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                        ctx.fillText(cd, sx+11, this.y+17);
                    } else if (this.t > 2000) {
                        const cd = Math.ceil((3000-this.t)/1000);
                        if (cd > 0) { ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.fillText(cd, sx+11, this.y+16); }
                    }
                    ctx.restore();
                }
            }
            trigger(px, py) {
                const dx = (px+player.size/2)-(this.x+11), dy = (py+player.size/2)-(this.y+11);
                if (Math.sqrt(dx*dx+dy*dy) < this.maxR && !this.fuseStarted && !this.exploding) {
                    this.fuseStarted = true; this.fuseTime = 800; return true;
                }
                return false;
            }
            hit(px, py) {
                if (!this.exploding || this.hasDamaged) return 0;
                const dx = (px+player.size/2)-(this.x+11), dy = (py+player.size/2)-(this.y+11);
                if (Math.sqrt(dx*dx+dy*dy) < this.r) { this.hasDamaged = true; return 2; }
                return 0;
            }
        }

        class Coin {
            constructor(x, y) { this.x = x; this.y = y; this.collected = false; this.o = Math.random()*Math.PI*2; }
            draw(t) {
                if (this.collected) return;
                const sx = this.x - camX, bob = Math.sin(t/200+this.o)*3;
                if (sx+7 < 0 || sx > W+7) return;
                ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#ffd700';
                ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(sx+7, this.y+7+bob, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffed4a'; ctx.beginPath(); ctx.arc(sx+7, this.y+7+bob, 4, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
            collect(px, py) {
                if (this.collected) return false;
                if (Math.sqrt((px+9-(this.x+7))**2+(py+9-(this.y+7))**2) < 15) { this.collected = true; return true; }
                return false;
            }
        }

        // ========== 核心函数 ==========

        function getCanvasSize(lvl) {
            if (lvl <= 40) return { w: 600, h: 400 };
            if (lvl <= 60) return { w: 680, h: 440 };
            if (lvl <= 80) return { w: 760, h: 480 };
            return { w: 840, h: 520 };
        }

        function initLevel(lvl) {
            level = lvl;
            const sz = getCanvasSize(lvl);
            canvas.width = sz.w; canvas.height = sz.h;
            worldW = sz.w; isScrolling = false; camX = 0;
            document.getElementById('progressBox').style.display = 'none';

            const stage = Math.min(10, Math.floor((lvl-1)/10) + 1);
            const stageBox = document.getElementById('stageBox');
            const stageName = document.getElementById('stageName');
            stageBox.style.display = 'inline';
            stageName.textContent = `阶段${stage}: ${STAGE_NAMES[stage-1]}`;

            Object.keys(keys).forEach(k => keys[k] = false);
            lives = maxLives;
            levelTime = Math.max(30, 60 - Math.floor((lvl-1)/10)*3);
            if (items.time > 0) { levelTime += 30; items.time--; }

            player.x = 50;
            player.y = Math.floor(canvas.height / 2) - 10;
            player.dizzy = 0;
            player.speed = items.speed > 0 ? 4.5 : 3;
            player.shield = items.shield > 0 ? 1 : 0;
            if (items.shield > 0) items.shield--;

            endPt.x = worldW - 70;
            endPt.y = Math.floor(canvas.height / 2) - 20;

            generateLevelByStage(lvl);
            particles = [];

            // Tutorial hint
            if (TUTORIALS[lvl]) {
                showTutorial(TUTORIALS[lvl]);
            }

            updateUI();
        }

        function showTutorial(text) {
            const el = document.getElementById('tutorialHint');
            el.textContent = text; el.style.display = 'block';
            if (tutorialTimer) clearTimeout(tutorialTimer);
            tutorialTimer = setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function generateLevelByStage(lvl) {
            lasers = []; bombs = []; coinList = [];
            const cw = canvas.width, ch = canvas.height;
            const stage = Math.min(10, Math.floor((lvl-1)/10) + 1);
            const baseInt = Math.max(500, 1400 - (lvl-1) * 10);
            const maxType = Math.min(4, Math.floor((lvl-1)/15));

            switch(stage) {
                case 1: genStage1(lvl, cw, ch, baseInt, maxType); break;
                case 2: genStage2(lvl, cw, ch, baseInt, maxType); break;
                case 3: genStage3(lvl, cw, ch, baseInt, maxType); break;
                case 4: genStage4(lvl, cw, ch, baseInt, maxType); break;
                case 5: genStage5(lvl, cw, ch, baseInt, maxType); break;
                case 6: genStage6(lvl, cw, ch, baseInt, maxType); break;
                case 7: genStage7(lvl, cw, ch, baseInt, maxType); break;
                case 8: genStage8(lvl, cw, ch, baseInt, maxType); break;
                case 9: genStage9(lvl, cw, ch, baseInt, maxType); break;
                case 10: genStage10(lvl, cw, ch, baseInt, maxType); break;
            }

            // 炸弹：避开起点终点
            if (lvl >= 5) {
                const bc = Math.min(4, 1 + Math.floor(lvl / 12));
                for (let i = 0; i < bc; i++) {
                    let x, y, ok, attempts = 0;
                    do {
                        x = 120 + Math.random() * (worldW - 240);
                        y = 40 + Math.random() * (ch - 80);
                        ok = Math.abs(x - 50) > 80 && Math.abs(x - endPt.x) > 80;
                        attempts++;
                    } while (!ok && attempts < 20);
                    if (ok) bombs.push(new Bomb(x, y));
                }
            }

            // 金币
            const cc = 2 + Math.floor((lvl-1)/10) * 2;
            for (let i = 0; i < cc * 3 && coinList.length < cc; i++) {
                const x = 80 + Math.random() * (worldW - 160);
                const y = 40 + Math.random() * (ch - 80);
                if (Math.abs(x - 50) > 40 && Math.abs(x - endPt.x) > 40) coinList.push(new Coin(x, y));
            }
        }

        // ========== 10大阶段生成 ==========

        // 阶段1：新手入门 - 每关独立设计，逐步教学 (1-10)
        function genStage1(lvl, cw, ch, baseInt, maxType) {
            const bi = baseInt;
            // 通道宽度（越大越简单）
            const pw = (lv) => Math.max(45, 90 - lv * 5);
            
            switch(lvl) {
                case 1:
                    // 1道宽通道，慢速激光，正中间
                    addKeyWall(cw*0.5, 0, ch, pw(1), 0, bi, 0);
                    break;
                case 2:
                    // 2道激光，通道偏移不同位置
                    addKeyWall(cw*0.35, 0, ch, pw(2), 0, bi, 0);
                    addKeyWall(cw*0.65, 0, ch, pw(2), 0, bi*0.9, 100);
                    break;
                case 3:
                    // 3道激光，通道在不同高度
                    addKeyWall(cw*0.3, 0, ch, pw(3), 0, bi, 0);
                    addKeyWall(cw*0.5, 0, ch, pw(3), 0, bi*0.9, 80);
                    addKeyWall(cw*0.7, 0, ch, pw(3), 0, bi*0.8, 160);
                    break;
                case 4:
                    // 2道墙 + 1条水平辅助激光
                    addKeyWall(cw*0.4, 0, ch, pw(4), 0, bi, 0);
                    addKeyWall(cw*0.65, 0, ch, pw(4), 0, bi*0.85, 120);
                    lasers.push(new Laser(0, ch*0.5, cw*0.3, 4, 0, bi*1.4, 0));
                    lasers.push(new Laser(cw*0.35, ch*0.5, cw*0.65, 4, 0, bi*1.4, bi/3));
                    break;
                case 5:
                    // 3道墙 + 2条水平激光（形成Z字形）
                    addKeyWall(cw*0.3, 0, ch, pw(5), 0, bi, 0);
                    addKeyWall(cw*0.5, 0, ch, pw(5), 0, bi*0.85, 100);
                    addKeyWall(cw*0.7, 0, ch, pw(5), 0, bi*0.8, 200);
                    lasers.push(new Laser(0, ch*0.35, cw*0.25, 4, 0, bi*1.3, 0));
                    lasers.push(new Laser(cw*0.75, ch*0.65, cw*0.25, 4, 0, bi*1.3, bi/2));
                    break;
                case 6:
                    // 4道墙密集排列
                    for (let i = 0; i < 4; i++) {
                        addKeyWall(cw*(0.25 + i*0.18), 0, ch, pw(6), 0, bi*(1-i*0.05), i*90);
                    }
                    break;
                case 7:
                    // 3道宽墙 + 顶部/底部水平封锁
                    addKeyWall(cw*0.35, 0, ch, pw(7), 0, bi, 0);
                    addKeyWall(cw*0.55, 0, ch, pw(7), 0, bi*0.85, 80);
                    addKeyWall(cw*0.75, 0, ch, pw(7), 0, bi*0.8, 160);
                    lasers.push(new Laser(0, 0, cw, 4, 0, bi*1.2, 0));
                    lasers.push(new Laser(0, ch-4, cw, 4, 0, bi*1.2, bi/2));
                    break;
                case 8:
                    // 5道墙（第一次5墙），通道较窄
                    for (let i = 0; i < 5; i++) {
                        addKeyWall(cw*(0.2 + i*0.15), 0, ch, pw(8), 0, bi*(1-i*0.04), i*70);
                    }
                    break;
                case 9:
                    // 4道墙 + 3条水平激光交叉
                    for (let i = 0; i < 4; i++) {
                        addKeyWall(cw*(0.25 + i*0.17), 0, ch, pw(9), 0, bi*(1-i*0.05), i*80);
                    }
                    for (let i = 0; i < 3; i++) {
                        const y = ch*(0.25 + i*0.25);
                        lasers.push(new Laser(0, y, cw*0.4, 4, 0, bi*1.1, i*100));
                        lasers.push(new Laser(cw*0.6, y, cw*0.4, 4, 0, bi*1.1, i*100+bi/3));
                    }
                    break;
                case 10:
                    // Boss关：5道墙 + 4条水平激光
                    for (let i = 0; i < 5; i++) {
                        addKeyWall(cw*(0.18 + i*0.16), 0, ch, pw(10), 0, bi*(1-i*0.04), i*60);
                    }
                    for (let i = 0; i < 4; i++) {
                        const y = ch*(0.2 + i*0.2);
                        lasers.push(new Laser(0, y, cw*0.35, 4, 0, bi*1.0, i*80));
                        lasers.push(new Laser(cw*0.65, y, cw*0.35, 4, 0, bi*1.0, i*80+bi/4));
                    }
                    break;
            }
        }
        
        function addKeyWall(x, y, ch, passageH, type, interval, offset) {
            const pY = 40 + ((x * 7 + passageH) % (ch - passageH - 80));
            const k1 = new Laser(x, y, 5, pY, type, interval, offset);
            k1.isKey = true; lasers.push(k1);
            const k2 = new Laser(x, pY + passageH, 5, ch - pY - passageH, type, interval, offset + interval/2);
            k2.isKey = true; lasers.push(k2);
        }

        // 阶段2：移动激光 - 引入水平/垂直移动激光 (11-20)
        function genStage2(lvl, cw, ch, baseInt, maxType) {
            // 静态激光墙
            for (let i = 0; i < 2; i++) {
                const x = 150 + i * (cw - 300);
                const passageY = 60 + ((lvl * 17 + i * 31) % (ch - 120));
                const k = new Laser(x, 0, 5, passageY, 0, baseInt, i * 200);
                k.isKey = true; lasers.push(k);
                const k2 = new Laser(x, passageY + 60, 5, ch - passageY - 60, 0, baseInt, i*200 + baseInt/2);
                k2.isKey = true; lasers.push(k2);
            }

            // 移动激光
            const numMov = 2 + Math.min(2, Math.floor((lvl-11)/3));
            for (let i = 0; i < numMov; i++) {
                const x = 100 + (i+1) * (cw - 200) / (numMov + 1);
                const y = ch * 0.3 + ((i % 2) * ch * 0.3);
                const mv = new MovingLaser(x, y, 30, 5, Math.min(2, maxType), baseInt * 1.2,
                    i % 2 === 0 ? 'x' : 'y', 40 + (lvl-11)*5, 0.8 + (lvl-11)*0.05);
                mv.isKey = true;
                lasers.push(mv);
            }

            // 短辅助激光
            for (let i = 0; i < 3; i++) {
                const x = 120 + i * (cw - 280) / 3;
                lasers.push(new Laser(x, 0, 4, ch * 0.2, 0, baseInt * 1.1, i*150));
                lasers.push(new Laser(x, ch * 0.8, 4, ch * 0.2, 0, baseInt * 1.1, i*150 + baseInt/2));
            }
        }

        // 阶段3：旋转扫描 - 引入旋转激光 (21-30)
        function genStage3(lvl, cw, ch, baseInt, maxType) {
            // 入口静态墙
            const sx = 120;
            const passageY1 = ch * 0.4 + ((lvl * 7) % (ch * 0.2));
            lasers.push(new Laser(sx, 0, 5, passageY1, 0, baseInt, 0).isKey = true ? lasers[lasers.length-1] : null);
            const k1 = new Laser(sx, 0, 5, passageY1, 0, baseInt, 0); k1.isKey = true; lasers.push(k1);
            const k2 = new Laser(sx, passageY1 + 55, 5, ch - passageY1 - 55, 0, baseInt, baseInt/2); k2.isKey = true; lasers.push(k2);

            // 旋转激光 - 中央扫描
            const numRot = 1 + Math.min(2, Math.floor((lvl-21)/3));
            for (let i = 0; i < numRot; i++) {
                const cx = cw * 0.4 + i * cw * 0.25;
                const cy = ch * 0.5;
                const len = 70 + (lvl-21) * 3;
                const spd = 0.6 + (lvl-21) * 0.05;
                lasers.push(new RotatingLaser(cx, cy, len, Math.min(2, maxType), baseInt * 1.1, spd, i * Math.PI / numRot));
            }

            // 出口静态墙
            const ex = cw - 140;
            const passageY2 = ch * 0.4 + ((lvl * 13) % (ch * 0.2));
            const k3 = new Laser(ex, 0, 5, passageY2, 1, baseInt, 300); k3.isKey = true; lasers.push(k3);
            const k4 = new Laser(ex, passageY2 + 55, 5, ch - passageY2 - 55, 1, baseInt, 300 + baseInt/2); k4.isKey = true; lasers.push(k4);
        }

        // 阶段4：组合障碍 - 静态+移动组合 (31-40)
        function genStage4(lvl, cw, ch, baseInt, maxType) {
            const numZones = 3;
            const zoneW = (cw - 100) / numZones;

            for (let z = 0; z < numZones; z++) {
                const zoneX = 60 + z * zoneW;
                const isMovingZone = z % 2 === 1;
                const passageY = 60 + ((lvl * 19 + z * 37) % (ch - 120));
                const passageH = Math.max(45, 70 - (lvl-31) * 2);
                const off = z * 150;

                if (isMovingZone) {
                    // 移动激光组合
                    const mx = zoneX + zoneW / 2;
                    const mv = new MovingLaser(mx, 0, 5, passageY, Math.min(1, maxType), baseInt, 'y', 20, 1.0);
                    mv.isKey = true; lasers.push(mv);
                    const mv2 = new MovingLaser(mx, passageY + passageH, 5, ch - passageY - passageH, Math.min(1, maxType), baseInt, 'y', 20, 1.0);
                    mv2.isKey = true; lasers.push(mv2);
                } else {
                    // 静态激光
                    const k = new Laser(zoneX + zoneW/2, 0, 5, passageY, Math.min(1, maxType), baseInt, off);
                    k.isKey = true; lasers.push(k);
                    const k2 = new Laser(zoneX + zoneW/2, passageY + passageH, 5, ch - passageY - passageH, Math.min(1, maxType), baseInt, off + baseInt/2);
                    k2.isKey = true; lasers.push(k2);
                }

                // 区域内辅助激光
                for (let i = 0; i < 2; i++) {
                    const y = 50 + i * (ch - 100);
                    lasers.push(new Laser(zoneX + 30, y, zoneW * 0.3, 4, 0, baseInt * 1.2, z*200 + i*100));
                }
            }
        }

        // 阶段5：迷宫通道 - 多路径迷宫 (41-50)
        function genStage5(lvl, cw, ch, baseInt, maxType) {
            const numWalls = 4 + Math.min(3, Math.floor((lvl-41)/3));
            const wallSpacing = (cw - 120) / (numWalls + 1);

            for (let i = 0; i < numWalls; i++) {
                const x = 70 + (i+1) * wallSpacing;
                const type = Math.min(maxType, Math.floor(i/2));
                const off = i * 100;

                // 每个墙有2-3个通道
                const numPassages = 2 + (i % 2);
                const passagePositions = [];

                for (let p = 0; p < numPassages; p++) {
                    const py = 30 + ((p+1) * (ch - 60)) / (numPassages + 1) + ((lvl * 7 + i * 13) % 30) - 15;
                    passagePositions.push({ y: py, h: Math.max(35, 55 - (lvl-41)) });
                }

                passagePositions.sort((a,b) => a.y - b.y);

                let lastY = 0;
                for (const p of passagePositions) {
                    if (p.y - lastY > 8) {
                        const k = new Laser(x, lastY, 5, p.y - lastY, type, baseInt + (i%2)*200, off);
                        k.isKey = true; lasers.push(k);
                    }
                    lastY = p.y + p.h;
                }
                if (ch - lastY > 8) {
                    const k = new Laser(x, lastY, 5, ch - lastY, type, baseInt + (i%2)*200, off);
                    k.isKey = true; lasers.push(k);
                }
            }
        }

        // 阶段6：高速动态 - 更快的移动+旋转组合 (51-60)
        function genStage6(lvl, cw, ch, baseInt, maxType) {
            // 快速移动激光
            const numMov = 3 + Math.min(2, Math.floor((lvl-51)/3));
            for (let i = 0; i < numMov; i++) {
                const x = 80 + (i+1) * (cw - 160) / (numMov + 1);
                const y = ch * 0.2 + (i % 3) * ch * 0.3;
                const spd = 1.2 + (lvl-51) * 0.08;
                const rng = 50 + (lvl-51) * 3;
                const mv = new MovingLaser(x, y, 25, 5, Math.min(2, maxType), baseInt * 0.9,
                    i % 2 === 0 ? 'x' : 'y', rng, spd);
                mv.isKey = true; lasers.push(mv);
            }

            // 旋转激光
            for (let i = 0; i < 2; i++) {
                const cx = cw * (0.35 + i * 0.3);
                const cy = ch * 0.5;
                const len = 60 + (lvl-51) * 2;
                lasers.push(new RotatingLaser(cx, cy, len, Math.min(3, maxType), baseInt, 0.8 + (lvl-51)*0.05, i * Math.PI/2));
            }

            // 边界静态激光
            for (let i = 0; i < 3; i++) {
                const y = 50 + i * (ch - 100) / 2;
                lasers.push(new Laser(0, y, 60, 4, 0, baseInt, i*120));
                lasers.push(new Laser(cw - 60, y, 60, 4, 0, baseInt, i*120 + baseInt/2));
            }
        }

        // 阶段7：连锁反应 - 相位差联动激光 (61-70)
        function genStage7(lvl, cw, ch, baseInt, maxType) {
            const numChains = 3 + Math.min(2, Math.floor((lvl-61)/3));
            const chainSpacing = (cw - 140) / (numChains + 1);

            for (let c = 0; c < numChains; c++) {
                const x = 80 + (c+1) * chainSpacing;
                const type = Math.min(maxType, c);
                // 连锁：3个激光依次开关
                const passageY = 60 + ((lvl * 17 + c * 23) % (ch - 120));
                const passageH = Math.max(40, 60 - (lvl-61) * 2);

                for (let i = 0; i < 3; i++) {
                    const phaseOff = i * (baseInt / 3);
                    const k1 = new Laser(x + i * 8, 0, 5, passageY + i * 5, type, baseInt * 0.85, phaseOff);
                    k1.isKey = true; lasers.push(k1);
                    const k2 = new Laser(x + i * 8, passageY + passageH + i * 5, 5, ch - passageY - passageH - i * 5, type, baseInt * 0.85, phaseOff + baseInt/2);
                    k2.isKey = true; lasers.push(k2);
                }
            }
        }

        // 阶段8：立体交叉 - 多层交叉激光场 (71-80)
        function genStage8(lvl, cw, ch, baseInt, maxType) {
            // 水平扫描激光
            const numH = 3 + Math.min(2, Math.floor((lvl-71)/3));
            for (let i = 0; i < numH; i++) {
                const y = 50 + (i+1) * (ch - 100) / (numH + 1);
                const spd = 1.0 + (lvl-71) * 0.06;
                const mv = new MovingLaser(0, y, cw, 5, Math.min(2, maxType), baseInt * 0.8, 'x', 0, spd * 0.5);
                mv.isKey = true; lasers.push(mv);
            }

            // 旋转激光交叉点
            for (let i = 0; i < 2; i++) {
                const cx = cw * (0.33 + i * 0.33);
                const cy = ch * 0.5;
                const len = 55 + (lvl-71) * 2;
                lasers.push(new RotatingLaser(cx, cy, len, Math.min(3, maxType), baseInt * 0.9, 0.9 + (lvl-71)*0.05, i * Math.PI / 3));
            }

            // 静态垂直激光
            for (let i = 0; i < 2; i++) {
                const x = cw * (0.25 + i * 0.5);
                const passageY = 80 + ((lvl * 11 + i * 17) % (ch - 160));
                const k = new Laser(x, 0, 5, passageY, Math.min(2, maxType), baseInt, i * 200);
                k.isKey = true; lasers.push(k);
                const k2 = new Laser(x, passageY + 50, 5, ch - passageY - 50, Math.min(2, maxType), baseInt, i*200 + baseInt/2);
                k2.isKey = true; lasers.push(k2);
            }
        }

        // 阶段9：极限挑战 - 所有机制组合 (81-90)
        function genStage9(lvl, cw, ch, baseInt, maxType) {
            // 静态墙
            for (let i = 0; i < 2; i++) {
                const x = 150 + i * (cw - 300);
                const passageY = 80 + ((lvl * 13 + i * 19) % (ch - 160));
                const k = new Laser(x, 0, 5, passageY, Math.min(3, maxType), baseInt * 0.8, i * 150);
                k.isKey = true; lasers.push(k);
                const k2 = new Laser(x, passageY + 45, 5, ch - passageY - 45, Math.min(3, maxType), baseInt * 0.8, i*150 + baseInt/3);
                k2.isKey = true; lasers.push(k2);
            }

            // 移动激光
            for (let i = 0; i < 3; i++) {
                const x = 100 + (i+1) * (cw - 200) / 4;
                const y = ch * 0.3 + (i % 2) * ch * 0.35;
                const mv = new MovingLaser(x, y, 25, 5, Math.min(2, maxType), baseInt * 0.85,
                    i % 2 === 0 ? 'x' : 'y', 50 + (lvl-81)*4, 1.3 + (lvl-81)*0.06);
                mv.isKey = true; lasers.push(mv);
            }

            // 旋转激光
            const cx = cw * 0.5, cy = ch * 0.5;
            lasers.push(new RotatingLaser(cx, cy, 70 + (lvl-81)*3, Math.min(3, maxType), baseInt * 0.85, 1.0 + (lvl-81)*0.05, 0));

            // 辅助激光
            for (let i = 0; i < 4; i++) {
                const y = 40 + i * (ch - 80) / 3;
                lasers.push(new Laser(0, y, 50, 3, 0, baseInt * 0.9, i*100));
                lasers.push(new Laser(cw-50, y, 50, 3, 0, baseInt * 0.9, i*100+baseInt/4));
            }
        }

        // 阶段10：终极Boss - 独特Boss模式 (91-100)
        function genStage10(lvl, cw, ch, baseInt, maxType) {
            const bossPhase = lvl - 91; // 0-9

            // Boss核心：中央旋转激光
            const cx = cw * 0.5, cy = ch * 0.5;
            const numArms = 2 + Math.min(2, Math.floor(bossPhase / 3));
            for (let i = 0; i < numArms; i++) {
                const len = 65 + bossPhase * 4;
                const spd = 0.8 + bossPhase * 0.08;
                lasers.push(new RotatingLaser(cx, cy, len, Math.min(4, maxType), baseInt * 0.7, spd, i * Math.PI / numArms));
            }

            // Boss防御环：移动激光围绕
            const numDef = 3 + Math.min(3, Math.floor(bossPhase / 2));
            for (let i = 0; i < numDef; i++) {
                const angle = (i / numDef) * Math.PI * 2 + bossPhase * 0.3;
                const dx = Math.cos(angle) * 80;
                const dy = Math.sin(angle) * 60;
                const mx = cx + dx, my = cy + dy;
                const mv = new MovingLaser(mx, my, 25, 5, Math.min(3, maxType), baseInt * 0.8,
                    i % 2 === 0 ? 'x' : 'y', 35, 1.5);
                mv.isKey = true; lasers.push(mv);
            }

            // 外围封锁
            for (let i = 0; i < 3; i++) {
                const y = 30 + i * (ch - 60) / 2;
                const k = new Laser(0, y, cw * 0.2, 4, Math.min(3, maxType), baseInt * 0.75, i*100);
                k.isKey = true; lasers.push(k);
                const k2 = new Laser(cw * 0.8, y, cw * 0.2, 4, Math.min(3, maxType), baseInt * 0.75, i*100+baseInt/3);
                k2.isKey = true; lasers.push(k2);
            }

            // 入口通道（相对宽松）
            const passageY = ch * 0.4 + (bossPhase % 3) * (ch * 0.1) - ch * 0.1;
            lasers.push(new Laser(100, 0, 5, passageY, 0, baseInt * 0.7, 50).isKey = true ? lasers[lasers.length-1] : null);
            const ik = new Laser(100, 0, 5, passageY, 0, baseInt * 0.7, 50); ik.isKey = true; lasers.push(ik);
            const ik2 = new Laser(100, passageY + 55, 5, ch - passageY - 55, 0, baseInt * 0.7, 50 + baseInt/2); ik2.isKey = true; lasers.push(ik2);
        }

        function updateUI() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('timer').textContent = levelTime;
            document.getElementById('level').textContent = level;
            document.getElementById('coins').textContent = coins;
        }

        // ========== 游戏循环 ==========

        function update(dt) {
            if (gameState !== 'playing') return;
            if (player.dizzy > 0) player.dizzy -= dt;

            let dx = 0, dy = 0;
            if (player.dizzy <= 0) {
                if (keys['ArrowUp'] || keys['w']) dy = -player.speed;
                if (keys['ArrowDown'] || keys['s']) dy = player.speed;
                if (keys['ArrowLeft'] || keys['a']) dx = -player.speed;
                if (keys['ArrowRight'] || keys['d']) dx = player.speed;
            } else {
                dx = (Math.random()-0.5)*player.speed; dy = (Math.random()-0.5)*player.speed;
            }
            player.x += dx; player.y += dy;
            player.x = Math.max(0, Math.min(worldW-player.size, player.x));
            player.y = Math.max(0, Math.min(H-player.size, player.y));

            if (isScrolling) {
                camX = Math.max(0, Math.min(worldW-W, player.x - W/3));
                document.getElementById('progress').textContent = Math.floor((player.x/worldW)*100);
            }

            lasers.forEach(l => l.update(dt, level));
            bombs = bombs.filter(b => {
                const alive = b.update(dt);
                if (b.trigger(player.x, player.y)) {
                    for (let i = 0; i < 8; i++) particles.push({x:b.x+11, y:b.y+11, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, life:25, c:'#ff4400'});
                }
                return alive;
            });
            particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });

            let dmg = 0;
            lasers.forEach(l => { const d = l.hit(player.x, player.y); if (d > 0) dmg = Math.max(dmg, d); });
            bombs.forEach(b => { const d = b.hit(player.x, player.y); if (d > 0) dmg = Math.max(dmg, d); });

            if (dmg > 0) {
                if (player.shield > 0) { player.shield = 0; dmg = 0; }
                if (dmg > 0) {
                    lives -= dmg;
                    if (bombs.some(b => b.hit(player.x, player.y) > 0)) player.dizzy = 1500;
                    updateUI();
                    player.x = 50; player.y = Math.floor(canvas.height/2) - 10; camX = 0;
                    if (lives <= 0) gameOver();
                }
            }

            coinList.forEach(c => {
                if (c.collect(player.x, player.y)) {
                    coins++;
                    for (let i = 0; i < 5; i++) particles.push({x:c.x+7, y:c.y+7, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:20, c:'#ffd700'});
                    updateUI();
                }
            });

            if (player.x+player.size > endPt.x && player.x < endPt.x+endPt.w &&
                player.y+player.size > endPt.y && player.y < endPt.y+endPt.h) {
                levelComplete();
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = 'rgba(0,212,255,0.05)';
            for (let x = -camX%40; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
            for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

            const ssx = startPt.x - camX;
            ctx.fillStyle = '#00ff88'; ctx.shadowBlur = 12; ctx.shadowColor = '#00ff88';
            ctx.fillRect(ssx, startPt.y, startPt.w, startPt.h);
            ctx.fillStyle = '#000'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.shadowBlur = 0;
            ctx.fillText('起', ssx+20, startPt.y+25);

            const esx = endPt.x - camX;
            if (esx > -50 && esx < W+50) {
                ctx.fillStyle = '#ff0066'; ctx.shadowBlur = 12; ctx.shadowColor = '#ff0066';
                ctx.fillRect(esx, endPt.y, endPt.w, endPt.h);
                ctx.fillStyle = '#fff'; ctx.fillText('终', esx+20, endPt.y+25); ctx.shadowBlur = 0;
            }

            lasers.forEach(l => l.draw());
            bombs.forEach(b => b.draw());
            coinList.forEach(c => c.draw(performance.now()));
            particles.forEach(p => {
                ctx.globalAlpha = p.life/25; ctx.fillStyle = p.c;
                ctx.fillRect(p.x-camX, p.y, 4, 4); ctx.globalAlpha = 1;
            });

            ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#00d4ff';
            ctx.fillStyle = player.shield > 0 ? '#00d4ff' : (player.dizzy > 0 ? '#ffaa00' : '#00d4ff');
            ctx.fillRect(player.x-camX, player.y, player.size, player.size);
            if (player.shield > 0) {
                ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(player.x-camX+9, player.y+9, 14, 0, Math.PI*2); ctx.stroke();
            }
            if (player.dizzy > 0) { ctx.font = '12px Arial'; ctx.fillText('💫', player.x-camX+9, player.y-5); }
            ctx.restore();
        }

        let gameLoopId = null;
        function gameLoop(ts) {
            if (gameState !== 'playing') { gameLoopId = null; return; }
            const dt = ts - lastTime; lastTime = ts;
            update(dt); draw();
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        function startGameLoop() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            lastTime = performance.now();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // ========== 游戏控制 ==========

        function startGame() {
            const startLvl = parseInt(document.getElementById('levelSlider').value);
            document.getElementById('levelSelectScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('actionBtn').textContent = '重新开始';
            gameState = 'playing'; level = startLvl; lives = maxLives; coins = 0; totalTime = 0;
            Object.keys(items).forEach(k => items[k] = 0);
            Object.keys(keys).forEach(k => keys[k] = false);
            initLevel(startLvl);
            startGameLoop();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    levelTime--; totalTime++;
                    if (levelTime <= 0) gameOver();
                    updateUI();
                }
            }, 1000);
        }

        function showLevelSelect() {
            const maxLvl = Math.max(1, maxLevelReached);
            document.getElementById('selectMaxLevel').textContent = maxLvl;
            document.getElementById('levelSlider').max = maxLvl;
            document.getElementById('levelSlider').value = 1;
            document.getElementById('selectedLevel').textContent = '1';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('levelSelectScreen').style.display = 'block';
        }

        function confirmStartLevel() { startGame(); }
        function backToMenu() {
            document.getElementById('levelSelectScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }

        function levelComplete() {
            clearInterval(timerInterval);
            saveMaxLevel(level);
            if (level % 10 === 0) { showShop(); return; }
            if (level >= 100) { victory(); return; }
            level++;
            initLevel(level);
            startGameLoop();
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    levelTime--; totalTime++;
                    if (levelTime <= 0) gameOver();
                    updateUI();
                }
            }, 1000);
        }

        function gameOver() {
            gameState = 'over'; clearInterval(timerInterval);
            saveMaxLevel(level);
            document.getElementById('goTitle').textContent = '游戏结束';
            document.getElementById('goTitle').style.color = '#ff6b6b';
            document.getElementById('goStats').innerHTML = `关卡: ${level}/100<br>用时: ${Math.floor(totalTime/60)}分${totalTime%60}秒<br>金币: ${coins}`;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        function victory() {
            gameState = 'victory'; clearInterval(timerInterval);
            document.getElementById('goTitle').textContent = '🎉 通关！';
            document.getElementById('goTitle').style.color = '#00ff88';
            document.getElementById('goStats').innerHTML = `恭喜通过100关！<br>总用时: ${Math.floor(totalTime/60)}分${totalTime%60}秒`;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        function showShop() {
            gameState = 'shop';
            document.getElementById('shopCoins').textContent = coins;
            document.getElementById('shopItems').innerHTML = `
                <div class="shop-item" onclick="buy('speed',10)">⚡ 加速靴<br><small>10🪙 速度+50%</small></div>
                <div class="shop-item" onclick="buy('shield',15)">🛡️ 防护盾<br><small>15🪙 抵挡伤害</small></div>
                <div class="shop-item" onclick="buy('life',8)">❤️ 生命药水<br><small>8🪙 +2生命</small></div>
                <div class="shop-item" onclick="buy('time',12)">⏱️ 时间沙漏<br><small>12🪙 +30秒</small></div>
            `;
            document.getElementById('shopScreen').style.display = 'block';
        }

        function buy(type, price) {
            if (coins >= price) {
                if (type === 'life') { maxLives += 2; updateUI(); }
                else items[type]++;
                coins -= price;
                document.getElementById('shopCoins').textContent = coins;
                updateUI();
            }
        }

        function closeShop() {
            document.getElementById('shopScreen').style.display = 'none';
            nextLevelAfterShop();
        }

        function nextLevelAfterShop() {
            gameState = 'playing';
            clearInterval(timerInterval);
            if (level >= 100) { victory(); return; }
            level++;
            initLevel(level);
            startGameLoop();
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    levelTime--; totalTime++;
                    if (levelTime <= 0) gameOver();
                    updateUI();
                }
            }, 1000);
        }

        function submitScore() {
            const name = document.getElementById('playerName').value.trim() || '匿名';
            lb.push({name, level, time: totalTime, coins, date: new Date().toLocaleDateString()});
            lb.sort((a,b) => b.level !== a.level ? b.level - a.level : a.time - b.time);
            lb = lb.slice(0, 20);
            localStorage.setItem('lb100', JSON.stringify(lb));
            document.getElementById('gameOverScreen').style.display = 'none';
            showLeaderboard();
        }

        function skipSubmit() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }

        function showLeaderboard() {
            const c = document.getElementById('lbContent');
            if (lb.length === 0) { c.innerHTML = '<p style="color:#888">暂无记录</p>'; }
            else {
                const displayLb = lb.slice(0, 7);
                let html = '<table><tr><th>排名</th><th>玩家</th><th>关卡</th><th>用时</th></tr>';
                displayLb.forEach((e, i) => {
                    const m = Math.floor(e.time/60), s = e.time%60;
                    html += `<tr><td>${i<3?['🥇','🥈','🥉'][i]:i+1}</td><td>${e.name}</td><td>${e.level}</td><td>${m}分${s}秒</td></tr>`;
                });
                html += '</table>';
                c.innerHTML = html;
            }
            document.getElementById('lbScreen').style.display = 'block';
        }

        function hideLeaderboard() {
            document.getElementById('lbScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }

        // ========== 输入 ==========

        document.addEventListener('keydown', e => { if(gameState === 'playing') keys[e.key] = true; });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        const dPadMap = { 'btnUp':'ArrowUp', 'btnDown':'ArrowDown', 'btnLeft':'ArrowLeft', 'btnRight':'ArrowRight' };
        Object.entries(dPadMap).forEach(([id, key]) => {
            const btn = document.getElementById(id);
            const press = e => { e.preventDefault(); e.stopPropagation(); if(gameState==='playing') keys[key]=true; btn.style.transform='scale(0.9)'; };
            const release = e => { e.preventDefault(); e.stopPropagation(); keys[key]=false; btn.style.transform=''; };
            btn.addEventListener('touchstart', press, {passive:false});
            btn.addEventListener('touchend', release, {passive:false});
            btn.addEventListener('touchcancel', release, {passive:false});
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        });

        document.getElementById('actionBtn').addEventListener('click', () => {
            if (gameState === 'playing' || gameState === 'over') showLevelSelect();
            else showLevelSelect();
        });

        document.getElementById('dPad').addEventListener('touchmove', e => e.preventDefault(), {passive:false});

        // 初始化
        initLevel(1);
        draw();
    </script>
</body>
</html>
